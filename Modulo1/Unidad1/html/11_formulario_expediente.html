<!DOCTYPE html>

<html>
<head>
    <title>Programacion 3</title>
</head>
<body>
    <p>Ejemplo de formulario simple</p>
    <form action="procesar.php" method="post">
        <table border="0">
            <tr>
                <th>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre"></th>
                <th>
                    <label for="email">Email:</label>       
                    <input type="email" id="email" name="email">
                </th>
            </tr>

            <tr>
                <th>
                    <label for="fecha">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha" name="fecha">
                </th>
                <th>
                    <label for="color">Color Favorito:</label>
                    <input type="color" id="color" name="color">
                </th>
            </tr>

            <tr>
                <th>
                    <label for="color">Genero:</label>
                    <input type="radio" id="m" name="genero" value="m" for="m">Masculino</label>
                    <input type="radio" id="f" name="genero" value="f" for="f">Femenino</label>
                </th>
                <th>
                    <label for="pais">Pais:</label>       
                    <select id="pais" name="pais">
                        <option value="ecuador">Ecuador</option>
                        <option value="colombia">Colombia</option>
                        <option value="peru">Peru</option>
                    </select>
                </th>
            </tr>
            <tr>
                <th>
                    <label for="comentarios">Comentarios:</label>
                    <textarea id="comentarios" name="comentarios" rows="5"></textarea>
                </th>
                <th>
                    <input type="checkbox" id="acepto" name="acepto" required>
                    <label for="acepto">Acepto los términos y condiciones</label>
                </th>
               
            </tr>
        </table>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpiar">

</body>
</html>
