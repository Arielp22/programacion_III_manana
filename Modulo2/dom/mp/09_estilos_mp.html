<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control Visual de Curso</title>
  <style>
    #cuadro {
      width: 100px;
      height: 100px;
      background-color: #58a6ff;
      border-radius: 10px;
      transition: all 0.5s ease;
    }
  </style>
</head>
<body>

  <h1>Panel Visual del Curso Sacramental</h1>

  <div id="cuadro"></div>

  <div style="margin-top:20px;">
    <button onclick="cambiarColor()">Cambiar color del panel</button>
    <button onclick="aumentarTamano()">Aumentar tamano</button>
    <button onclick="reiniciar()">Reiniciar panel</button>
  </div>

  <script src="09_estilos_mp.js"></script>
</body>
</html>
